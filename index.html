<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Scholar Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;700&display=swap"
        rel="stylesheet">

    <meta name="description"
        content="A comprehensive research tool for scholars to explore global country statistics and library resources through the REST Countries and Open Library APIs.">
    <meta name="author" content="Adelso Tzep">
    <link rel="icon" href="images/favicon.ico">

    <meta property="og:title" content="Global Scholar Dashboard">
    <meta property="og:type" content="website">
    <meta property="og:url"
        content="https://adelsolorenzohmi-cloud.github.io/wdd231/global-scholar-dashboard/index.html">
    <meta property="og:image"
        content="https://adelsolorenzohmi-cloud.github.io/wdd231/global-scholar-dashboard/preview-image.webp">
    <meta property="og:description"
        content="Access real-time country data and a vast digital library in one centralized, intuitive interface.">

    <link rel="stylesheet" href="styles/styles.css">
    <script type="module" src="scripts/main.js"></script>

</head>

<body>
    <header>
        <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo">
            <path d="M50 15L20 30L50 45L80 30L50 15Z" fill="white" />
            <path d="M30 35V45C30 45 35 50 50 50C65 50 70 45 70 45V35" stroke="white" stroke-width="3" />
            <circle cx="50" cy="65" r="20" stroke="white" stroke-width="2" />
            <ellipse cx="50" cy="65" rx="8" ry="20" stroke="white" stroke-width="2" />
            <line x1="30" y1="65" x2="70" y2="65" stroke="white" stroke-width="2" />
            <path d="M15 85C30 75 50 75 50 75C50 75 70 75 85 85" stroke="white" stroke-width="3" fill="none" />
            <path d="M15 60V85M85 60V85M50 65V75" stroke="white" stroke-width="2" />
        </svg>

        <h1>Global Scholar Dashboard.</h1>
        <p>Your portal for international academic data.</p>
    </header>

    <main>
        <section class="controls">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search API (e.g. Guatemala)">
                <button id="search-btn"> Fetch Live Info</button>
            </div>

            <div class="filter-box">
                <label for="region-filter">Filter Local Data</label>
                <select id="region-filter">
                    <option value="all">All Regions</option>
                    <option value="Americas">Americas</option>
                    <option value="Europe">Europe</option>
                    <option value="Asia">Asia</option>
                    <option value="Africa">Africa</option>
                </select>
            </div>
        </section>

        <section id="api-result">
            <div id="country-card-container">
            </div>
        </section>

        <section id="local-data">
            <h3>Academic Profiles (Local Database)</h3>
            <div id="academic-grid" class="grid-container">
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 | WDD 330 | BYU-Idaho</p>
    </footer>
</body>

</html>
